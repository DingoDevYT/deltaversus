<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DELTAVERSUS — GML Automated Multi-Script Translator Studio</title>
<style>
  :root {
    --bg: #090a10;
    --panel: #13141f;
    --card: #1c1d2d;
    --border: #2c2d42;
    --accent: #ffe100;
    --accent-blue: #00d2ff;
    --ink: #e8e8f5;
    --dim: #8b8ca8;
    --code-bg: #0d0e17;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
  }
  header .tag {
    font-size: 11px;
    background: rgba(255,225,0,0.15);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,225,0,0.3);
  }
  .controls-bar {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  select, button, input {
    font-family: inherit;
    font-size: 13px;
    border-radius: 6px;
    padding: 7px 12px;
    transition: all 0.15s ease;
  }
  select, input {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--border);
  }
  button {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--border);
    font-weight: 600;
    cursor: pointer;
  }
  button:hover {
    border-color: var(--accent);
    background: #25263a;
  }
  button.btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
  }
  button.btn-primary:hover {
    background: #ffd000;
    box-shadow: 0 0 12px rgba(255,225,0,0.4);
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: calc(100vh - 57px);
  }

  .editor-section, .preview-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    background: #0e0f18;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--dim);
    cursor: pointer;
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .tab.active {
    color: var(--accent-blue);
    background: var(--panel);
    border-bottom: 2px solid var(--accent-blue);
  }

  .code-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 10px;
    overflow-y: auto;
  }

  .code-box {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .code-box label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dim);
    font-weight: 700;
  }
  textarea {
    flex: 1;
    background: var(--code-bg);
    color: #a6e22e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.4;
    resize: none;
    outline: none;
  }
  textarea:focus {
    border-color: var(--accent-blue);
  }

  .preview-section {
    align-items: center;
    justify-content: center;
    position: relative;
    background: #000;
  }

  canvas {
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #222;
    border-radius: 4px;
    max-width: 100%;
    max-height: 100%;
  }

  .hud-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 13px;
    color: #fff;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .hud-overlay b { color: var(--accent); }

  .output-code {
    background: var(--code-bg);
    color: #f8f8f2;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    overflow-y: auto;
    flex: 1;
  }
  .error-log {
    background: #2a0808;
    color: #ff6b6b;
    padding: 8px 12px;
    font-size: 11px;
    font-family: monospace;
    border-top: 1px solid #4a1515;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>DELTAVERSUS <span class="tag">Multi-Script GML Translator Studio</span></h1>
  <div class="controls-bar">
    <select id="presetSelect">
      <option value="">-- Load GML Object Preset --</option>
      <option value="knight_star">The Knight — obj_knight_pointing_star</option>
      <option value="knight_tunnel">The Knight — obj_knight_tunnel_slasher_2_revised</option>
      <option value="gerson_squish">Gerson — obj_gerson_squishes_box</option>
      <option value="sneo_wall">Spamton NEO — obj_sneo_wall_controller_new</option>
    </select>
    <button id="btnTranslate" class="btn-primary">▶ Transpile & Play</button>
    <button id="btnReset">↻ Reset Engine</button>
  </div>
</header>

<main>
  <!-- Left Side: GML Input / Transpiled JS Tabs -->
  <div class="editor-section">
    <div class="tabs">
      <div class="tab active" data-tab="gml">GML Object Events</div>
      <div class="tab" data-tab="js">Generated JS Class</div>
    </div>
    <div id="tabGML" class="code-container">
      <div class="code-box" style="flex:none">
        <label>GameMaker Object Name</label>
        <input type="text" id="objName" value="obj_knight_pointing_star" style="background:var(--code-bg);color:var(--ink);border:1px solid var(--border);padding:6px;border-radius:4px;font-family:monospace">
      </div>
      <div class="code-box">
        <label>Create Event (Create_0.gml)</label>
        <textarea id="gmlCreate" placeholder="// Create_0.gml code..."></textarea>
      </div>
      <div class="code-box">
        <label>Step Event (Step_0.gml)</label>
        <textarea id="gmlStep" placeholder="// Step_0.gml code..."></textarea>
      </div>
      <div class="code-box">
        <label>Draw Event (Draw_0.gml)</label>
        <textarea id="gmlDraw" placeholder="// Optional Draw_0.gml code..."></textarea>
      </div>
    </div>
    <div id="tabJS" class="code-container" style="display:none">
      <div class="output-code" id="jsResult">// Transpiled JavaScript object class code will appear here...</div>
    </div>
    <div id="errorLog" class="error-log"></div>
  </div>

  <!-- Right Side: Live HTML5 Canvas Preview -->
  <div class="preview-section">
    <div class="hud-overlay">
      <div>Status: <b id="statusText">Ready</b></div>
      <div>FPS: <span id="fpsText">60</span> | Active Instances: <span id="instCount">0</span></div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px">Move SOUL with WASD or Arrow Keys</div>
    </div>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
</main>

<script src="js/gml_asset_db.js"></script>
<script src="js/gml_runtime.js"></script>
<script src="js/gml_translator.js"></script>
<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const translator = new GMLTranslator();
  let runtime = new GMLRuntimeEnvironment();

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('tabGML').style.display = target === 'gml' ? 'flex' : 'none';
      document.getElementById('tabJS').style.display = target === 'js' ? 'flex' : 'none';
    });
  });

  // Presets
  const PRESETS = {
    knight_star: {
      name: 'obj_knight_pointing_star',
      create: `direction = point_direction(x, y, obj_heart.x, obj_heart.y);
speed = 2;
friction = -0.05;
image_angle = direction;
sprite_index = "spr_knight_bullet_star";
timer = 0;
con = 0;
growspeed = 0.05;
playSound = 1;
difficulty = 2;`,
      step: `timer += 1;
if (con == 0) {
  image_xscale += growspeed;
  image_yscale += growspeed;
  if (timer >= 30) con = 1;
} else if (con == 1) {
  friction = 0.5;
  if (speed <= 0.1) con = 2;
} else if (con == 2) {
  if (timer >= 60) {
    for (var i = 0; i < 6; i += 1) {
      var d = instance_create(x, y, obj_knight_star_shrapnel);
      d.direction = i * 60;
      d.speed = 4;
      d.sprite_index = "spr_knight_star";
      d.image_blend = c_red;
    }
    instance_destroy();
  }
}`
    },
    knight_tunnel: {
      name: 'obj_knight_tunnel_slasher_2_revised',
      create: `vspeed = 0;
hspeed = -4;
timer = 0;
vertical_pos = 0;`,
      step: `timer += 1;
if (timer % 8 == 0) {
  var newpos = vertical_pos + 15 + irandom(90);
  if (newpos > 60) newpos -= 120;
  vertical_pos = clamp(newpos, -50, 50);
  
  var gapY = obj_growtangle.y + vertical_pos;
  var topBlade = instance_create(x, gapY - 70, obj_tunnel_blade);
  topBlade.hspeed = -5;
  topBlade.image_angle = 270;
  topBlade.sprite_index = "spr_knight_sword";
  
  var botBlade = instance_create(x, gapY + 70, obj_tunnel_blade);
  botBlade.hspeed = -5;
  botBlade.image_angle = 90;
  botBlade.sprite_index = "spr_knight_sword";
}`
    },
    gerson_squish: {
      name: 'obj_gerson_squishes_box',
      create: `timer = 0;`,
      step: `timer += 1;
if (timer == 26) {
  obj_growtangle.image_xscale = 2.5;
  obj_growtangle.image_yscale = 0.3;
}
if (timer > 30 && timer < 120 && timer % 12 == 0) {
  var slash = instance_create(obj_growtangle.x + random_range(-140, 140), obj_growtangle.y, obj_gerson_slash);
  slash.sprite_index = "spr_gerson_hammer";
}`
    },
    sneo_wall: {
      name: 'obj_sneo_wall_controller_new',
      create: `timer = 0;
spd = -16;`,
      step: `timer += 1;
if (timer < 16) spd += 0.6;
else spd -= 0.1;

if (timer % 34 == 0) {
  for (var r = 0; r < 5; r++) {
    if (r !== 2) {
      var tile = instance_create(x, obj_growtangle.y - 60 + r * 30, obj_sneo_tile);
      tile.hspeed = spd;
      tile.sprite_index = "spr_sneo_head";
    }
  }
}`
    }
  };

  document.getElementById('presetSelect').addEventListener('change', (e) => {
    const key = e.target.value;
    if (PRESETS[key]) {
      document.getElementById('objName').value = PRESETS[key].name;
      document.getElementById('gmlCreate').value = PRESETS[key].create;
      document.getElementById('gmlStep').value = PRESETS[key].step;
      document.getElementById('gmlDraw').value = PRESETS[key].draw || '';
    }
  });

  // Controls (WASD / Arrows for Soul)
  const keys = {};
  window.addEventListener('keydown', e => keys[e.key] = true);
  window.addEventListener('keyup', e => keys[e.key] = false);

  function updateSoul() {
    const spd = 4;
    if (isNaN(runtime.soul.x) || isNaN(runtime.soul.y)) {
      runtime.soul.x = 320;
      runtime.soul.y = 240;
    }

    if (keys['ArrowLeft'] || keys['a'] || keys['A']) runtime.soul.x -= spd;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) runtime.soul.x += spd;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) runtime.soul.y -= spd;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) runtime.soul.y += spd;

    const bw = Math.max(20, ((runtime.growtangle.width || 160) * Math.abs(runtime.growtangle.image_xscale || 1)) / 2);
    const bh = Math.max(20, ((runtime.growtangle.height || 160) * Math.abs(runtime.growtangle.image_yscale || 1)) / 2);
    const gx = runtime.growtangle.x || 320;
    const gy = runtime.growtangle.y || 240;

    runtime.soul.x = gmlMath.clamp(runtime.soul.x, gx - bw + 8, gx + bw - 8);
    runtime.soul.y = gmlMath.clamp(runtime.soul.y, gy - bh + 8, gy + bh - 8);
  }

  // Translation & Execution Engine
  function translateAndPlay() {
    const objName = document.getElementById('objName').value.trim() || 'obj_translated_attack';
    const gmlCreate = document.getElementById('gmlCreate').value;
    const gmlStep = document.getElementById('gmlStep').value;
    const gmlDraw = document.getElementById('gmlDraw').value;

    const compiled = translator.compileObject(objName, { create: gmlCreate, step: gmlStep, draw: gmlDraw });
    document.getElementById('jsResult').textContent = compiled.code;

    // Reset Engine Runtime Environment
    runtime = new GMLRuntimeEnvironment();
    document.getElementById('errorLog').style.display = 'none';
    
    try {
      const evalFunc = new Function(
        'GMLInstance', 'gmlMath', 'Snd', 'runtime', 
        'draw_sprite_ext', 'draw_set_blend_mode', 'scr_draw_beam_color', 'sprite_get_width', 'sprite_get_height', 
        'scr_afterimage', 'merge_color', 'toCSSColor', 'scr_ease_in', 'bm_add', 'bm_normal',
        'c_white', 'c_red', 'c_black', 'c_blue', 'c_yellow', 'c_gray',
        compiled.code + `;\nreturn ${objName};`
      );

      const ObjectClass = evalFunc(
        GMLInstance, gmlMath, { play: () => {} }, runtime, 
        draw_sprite_ext, draw_set_blend_mode, scr_draw_beam_color, sprite_get_width, sprite_get_height,
        scr_afterimage, merge_color, toCSSColor, scr_ease_in, bm_add, bm_normal,
        '#ffffff', '#ff0000', '#000000', '#0000ff', '#ffff00', '#808080'
      );
      
      runtime.registerObject(objName, ObjectClass);
      // Spawn at battle box center (320, 240)
      runtime.createInstance(objName, 320, 240);

      document.getElementById('statusText').textContent = 'Running';
      document.getElementById('statusText').style.color = '#38d878';
    } catch(err) {
      document.getElementById('statusText').textContent = 'Translation Error';
      document.getElementById('statusText').style.color = '#ff5a5a';
      document.getElementById('errorLog').style.display = 'block';
      document.getElementById('errorLog').textContent = 'Translation Exception:\n' + err.stack;
      console.error('Translation Exception:', err);
    }
  }

  document.getElementById('btnTranslate').addEventListener('click', translateAndPlay);
  document.getElementById('btnReset').addEventListener('click', () => {
    runtime = new GMLRuntimeEnvironment();
  });

  // Main Render Loop (60 FPS)
  let lastTime = performance.now(), frameCount = 0, fps = 60;
  function gameLoop(now) {
    frameCount++;
    if (now - lastTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      lastTime = now;
      document.getElementById('fpsText').textContent = fps;
    }

    updateSoul();
    runtime.step();

    // Render Canvas
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw Growtangle (Battle Box)
    const bx = runtime.growtangle.x || 320, by = runtime.growtangle.y || 240;
    const bw = (runtime.growtangle.width || 160) * Math.abs(runtime.growtangle.image_xscale || 1);
    const bh = (runtime.growtangle.height || 160) * Math.abs(runtime.growtangle.image_yscale || 1);

    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth = 4;
    ctx.strokeRect(bx - bw / 2, by - bh / 2, bw, bh);

    // Draw Instances
    runtime.draw(ctx);

    // Draw Soul
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(runtime.soul.x, runtime.soul.y, 6, 0, Math.PI * 2);
    ctx.fill();

    document.getElementById('instCount').textContent = runtime.instances.length;

    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(gameLoop);

  // Auto-load default preset
  document.getElementById('presetSelect').value = 'knight_star';
  document.getElementById('presetSelect').dispatchEvent(new Event('change'));
  
  // Auto-run initial translation on load
  setTimeout(translateAndPlay, 100);
})();
</script>
</body>
</html>
