<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DELTAVERSUS — Attack Preview & Feedback</title>
<style>
  :root { --bg:#0c0c14; --card:#15151f; --line:#2a2a3a; --ink:#e8e8f0; --dim:#8a8aa0;
          --good:#38d878; --bad:#ff5060; --accent:#ffe100; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family: "Segoe UI", system-ui, sans-serif; padding: 16px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--dim); font-size: 13px; margin-bottom: 14px; }
  .bar { position: sticky; top: 0; z-index: 5; background: var(--bg);
         padding: 10px 0 12px; border-bottom: 1px solid var(--line); margin-bottom: 16px;
         display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button { font: inherit; cursor: pointer; border-radius: 7px; border:1px solid var(--line);
           background:#20202e; color:var(--ink); padding:7px 12px; }
  button:hover { border-color:#454560; }
  .btn-primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
  .count { color: var(--dim); font-size: 13px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;
          display:flex; flex-direction:column; }
  .card.good { border-color: var(--good); }
  .card.bad  { border-color: var(--bad); }
  .head { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line); }
  .boss { font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--dim); }
  .name { font-size:15px; font-weight:600; }
  .soul { margin-left:auto; font-size:11px; padding:2px 7px; border-radius:20px; border:1px solid var(--line); }
  .soul.yellow { color:#ffe100; border-color:#5a5320; background:#211f08; }
  .soul.red    { color:#ff5a5a; border-color:#5a2020; background:#210808; }
  canvas { width:100%; height:auto; display:block; background:#000; image-rendering: pixelated; }
  .ctl { display:flex; gap:6px; padding:10px 12px; align-items:center; }
  .verdict { flex:0 0 auto; display:flex; gap:6px; }
  .vb { width:38px; height:34px; font-size:16px; line-height:1; padding:0; }
  .vb.tick.on { background:var(--good); border-color:var(--good); color:#04210f; }
  .vb.cross.on { background:var(--bad); border-color:var(--bad); color:#210404; }
  .replay { margin-left:auto; font-size:12px; padding:6px 9px; }
  textarea { width:100%; min-height:56px; resize:vertical; background:#0e0e16; color:var(--ink);
             border:1px solid var(--line); border-radius:8px; padding:8px; font:inherit; font-size:13px;
             margin:0 12px 12px; width:calc(100% - 24px); }
  .out { width:100%; min-height:160px; margin-top:16px; }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#222; color:#fff;
           padding:10px 16px; border-radius:8px; border:1px solid var(--line); opacity:0; transition:opacity .2s;
           pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
  <h1>DELTAVERSUS — Attack Preview &amp; Feedback</h1>
  <div class="sub">Live-rendered from the real <code>patterns.js</code>. Mark each ✓/✗ and jot notes, then <b>Copy feedback</b> and paste it back to me. (Saved automatically as you go.)</div>

  <div class="bar">
    <button class="btn-primary" id="copyBtn">📋 Copy feedback</button>
    <button id="dlBtn">⬇ Download feedback.json</button>
    <button id="clearBtn">↺ Reset marks</button>
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="grid"></div>
  <textarea class="out" id="out" placeholder="Feedback summary appears here when you hit Copy…" readonly></textarea>
  <div class="toast" id="toast"></div>

const SOULCOL = { yellow:'#ffe100', red:'#ff2020' };
const CW = 480, CH = 300;   // canvas coordinate space

// --- renderer copied from battle.js so this page needs nothing else ---
const soulTints = {};
function tintedSoul(color) {
  if (soulTints[color]) return soulTints[color];
  const src = A.ui('soul');
  const c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
  const x = c.getContext('2d'); x.drawImage(src, 0, 0);
  x.globalCompositeOperation = 'source-in'; x.fillStyle = color; x.fillRect(0, 0, c.width, c.height);
  soulTints[color] = c; return c;
}
const imgTints = {};
function tintImg(img, color) {
  const key = (img.src || img._tid || (img._tid = Math.random())) + '|' + color;
  if (imgTints[key]) return imgTints[key];
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const x = c.getContext('2d'); x.drawImage(img, 0, 0);
  x.globalCompositeOperation = 'source-in'; x.fillStyle = color; x.fillRect(0, 0, c.width, c.height);
  imgTints[key] = c; return c;
}
function drawBullet(ctx, b, px, py, s) {
  if (b.noDraw) return;
  if (b.drawDX) px += b.drawDX * s;
  if (b.drawDY) py += b.drawDY * s;
  if (b.img && b.img.width) {
    const im = b.tint ? tintImg(b.img, b.tint) : b.img;
    drawSpr(ctx, im, px, py, { scale: (b.scale || 1) * 1.6 * s, rot: b.rot || 0, flip: b.flip, sx: b.sx, sy: b.sy, alpha: b.alpha });
    return;
  }
  ctx.fillStyle = b.color || '#fff';
  if (b.shape === 'crescent') {
    const r = (b.r || 8) * 1.5 * s;
    ctx.save(); ctx.translate(px, py); ctx.rotate((b.rot || 0));
    ctx.strokeStyle = b.color || '#fff'; ctx.lineWidth = Math.max(2, 4 * s);
    ctx.beginPath(); ctx.arc(-r * 0.35, 0, r, -1.1, 1.1); ctx.stroke();
    ctx.restore();
  } else if (b.shape === 'star') {
    ctx.save(); ctx.translate(px, py); ctx.rotate((b.t || 0) * 0.1);
    for (let i = 0; i < 4; i++) { ctx.rotate(Math.PI / 2); ctx.fillRect(-1 * s, -6 * s, 2 * s, 12 * s); }
    ctx.restore();
  } else if (b.shape === 'line') {
    const L = (b.len || 400) * s, th = (b.thick || 4) * s;
    ctx.save(); ctx.translate(px, py); ctx.rotate(b.rot || 0);
    ctx.globalAlpha = b.armed ? 1 : (b.tellFade != null ? b.tellFade : 0.5);
    ctx.fillStyle = b.color || '#f33'; ctx.fillRect(-L / 2, -th / 2, L, th);
    ctx.restore(); ctx.globalAlpha = 1;
  } else { ctx.beginPath(); ctx.arc(px, py, (b.r || 5) * s, 0, 7); ctx.fill(); }
}

// one animated preview player per attack
function makePlayer(canvas, spec) {
  const ctx = canvas.getContext('2d');
  const p = PATTERNS[spec.id];
  const bw = p.box ? p.box.w : 200, bh = p.box ? p.box.h : 200;
  const box = { x: Math.round(CW/2 - bw/2), y: Math.round(CH/2 - bh/2), w: bw, h: bh };
  const soulImg = A.img[spec.soul === 'yellow' ? 'assets/ui/soul/yheart0.png' : 'assets/ui/soul/red0.png'] || tintedSoul(SOULCOL[spec.soul]);
  const imgs = (typeof imgsOf === 'function') ? imgsOf(spec.base || 'kris') : {};   // char-frame sprites (Lancer spades etc.)
  let bullets = [], f = 0, seed = spec.id.length + 3, t = 0;
  const rng = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
  const soul = { x: box.x + box.w/2, y: box.y + box.h/2 };
  const base = { x: box.x, y: box.y, w: box.w, h: box.h };
  const FX = {};
  function reset() { bullets = []; f = 0; box.x=base.x; box.y=base.y; box.w=base.w; box.h=base.h; }
  function step() {
    // gentle auto-move so aimed/homing attacks track a moving target
    t += 1;
    soul.x = box.x + box.w/2 + Math.sin(t*0.031) * box.w*0.30;
    soul.y = box.y + box.h/2 + Math.sin(t*0.047) * box.h*0.26;
    // apply pattern fx from last tick (box warp, soul pull)
    if (FX.boxTarget) { const tg=FX.boxTarget, lp=FX.boxLerp||0.14; box.w+=(tg.w-box.w)*lp; box.h+=(tg.h-box.h)*lp; box.x+=(tg.x-box.x)*lp; box.y+=(tg.y-box.y)*lp; }
    if (FX.pull) { const an=Math.atan2(FX.pull.y-soul.y, FX.pull.x-soul.x); soul.x+=Math.cos(an)*FX.pull.force; soul.y+=Math.sin(an)*FX.pull.force; }
    if (FX.split) {   // board split: halves separate OUTWARD from the cut; soul + riding teeth move with their half
      const cutC = FX.split.axis==='h' ? box.y+box.h/2 : box.x+box.w/2;
      const delta = FX.split.offset - (FX._prevSplit||0);
      const side = (FX.split.axis==='h' ? soul.y < cutC : soul.x < cutC) ? 1 : -1;
      if (FX.split.axis==='h') soul.y -= delta*side; else soul.x -= delta*side;
      for (const b of bullets) if (b.ridesSplit) { if (FX.split.axis==='h') b.y -= delta*b.ridesSplit; else b.x -= delta*b.ridesSplit; }
      FX._prevSplit = FX.split.offset;
    } else FX._prevSplit = 0;
    if (FX.arena && !FX.boxTarget) FX.boxTarget = { x: 8, y: 8, w: CW - 16, h: CH - 16 };
    FX.blackout=false; FX.pull=null; FX.faceBox=null; FX.arms=null; FX.bgHue=null; FX.split=null; FX.boss=null; FX.hideBox=false; FX.pinch=0; FX.arena=false; FX.bgStars=false; FX.shake=0;
    const add = b => { b.t = b.t||0; b.phase0 = b.phase0||0; bullets.push(b); };
    if (f <= (p.dur||480)) p.tick({ f, rng, box, tier:1, add, soul, imgs, fx:FX });
    const spawned = [];
    for (const b of bullets) {
      if (b.dead) continue;
      if (b.animKeys && b.animRate) b.img = bulletProps(b.animKeys[Math.floor(b.t/b.animRate)%b.animKeys.length]).img;   // frame-cycled sprite
      if (b.homing) { const d = Math.hypot(soul.x-b.x, soul.y-b.y)||1; b.vx += (soul.x-b.x)/d*b.homing; b.vy += (soul.y-b.y)/d*b.homing; }
      if (b.maxv) { const v = Math.hypot(b.vx||0, b.vy||0); if (v > b.maxv) { b.vx *= b.maxv/v; b.vy *= b.maxv/v; } }
      if (b.carousel) {   // fake-3D carousel column (Jevil)
        const c = b.carousel; c.ang += c.w; const depth = Math.cos(c.ang);
        b.x = c.cx + Math.sin(c.ang)*c.R; b.y = c.rowY + Math.sin(c.ang*3 + c.phase)*c.bob;
        b.scale = 0.62 + 0.5*(depth*0.5+0.5); b._back = depth < 0.02; b.flip = depth < 0;
      } else if (b.orbit) { const o=b.orbit; o.ang += o.w; if(o.vx)o.cx+=o.vx; if(o.vy)o.cy+=o.vy;
        if(o.center){ o.cx=o.center.cx0+o.center.ax*Math.sin(b.t*o.center.f); o.cy=o.center.cy0+o.center.ay*Math.cos(b.t*o.center.f); }
        if(o.pulse) o.R = o.pulse.base + o.pulse.amp*Math.sin(b.t*o.pulse.freq);
        b.x = o.cx + Math.cos(o.ang)*o.R; b.y = o.cy + Math.sin(o.ang)*o.R; }
      else { b.vx = (b.vx||0)+(b.ax||0); b.vy = (b.vy||0)+(b.ay||0); b.x += (b.vx||0); b.y += (b.vy||0); }
      if (b.swing) b.x = b.swing.cx + b.swing.amp * Math.sin(b.t*b.swing.spd + (b.swing.ph||0));
      if (b.sineA) b.y += Math.sin(b.t*(b.sineF||0.05)*6.28 + b.phase0) * b.sineA;
      if (b.lerpY != null) b.y += (b.lerpY - b.y) * (b.lerpRate || 0.12);
      if (b.spin) b.rot = (b.rot||0) + b.spin;
      if (b.spinDecay) { b.spin *= b.spinDecay; if (Math.abs(b.spin) < 0.0008) b.spin = 0; }
      if (b.shrink) b.scale = (b.scale||1) * b.shrink;
      if (b.fade && b.life) { const fd = b.fadeDelay||0; b.alpha = b.t<=fd ? 1 : Math.max(0, 1-(b.t-fd)/Math.max(1,b.life-fd)); }
      if (b.redAt != null && b.t >= b.redAt) b.tint = '#f33';
      if (b.aim) {
        if (b.t < b.aim.delay) { const px=Math.cos(b.aim.dir+Math.PI/2), py=Math.sin(b.aim.dir+Math.PI/2), rel=(soul.x-b.x)*px+(soul.y-b.y)*py; b.x+=px*rel*0.14; b.y+=py*rel*0.14; b.rot=b.aim.dir; b.tint='#f44'; b.alpha=Math.min(1,b.t/16)*0.5; }
        else if (b.t === b.aim.delay) { b.vx=Math.cos(b.aim.dir)*b.aim.speed; b.vy=Math.sin(b.aim.dir)*b.aim.speed; b.tint=null; b.alpha=1; }
      }
      if (b.fireAt != null && b.t === b.fireAt) { b.vx = b.fireVX || 0; b.vy = b.fireVY || 0; b.noHit = false; }
      if (b.tellT != null && --b.tellT <= 0 && !b.armed) { b.armed = true; b.armT = b.armWindow || 10; }
      if (b.armed && b.armT != null && --b.armT <= 0) b.dead = true;
      if (b.emit && !b.dead) b.emit(b, spawned, soul, box, FX);
      if (b.burst && b.t >= b.burst) {
        b.dead = true;
        const n = b.burstN||8, bsp = b.burstSpeed||2.2, full = b.burstArc == null;
        const bimg = b.burstImg ? bulletProps(b.burstImg).img : b.img;
        for (let i=0;i<n;i++){
          const ang = b.burstScatter ? Math.random()*6.28
                    : full ? (i/n*6.28+(b.burstRot||0)) : ((b.burstAng||0) + (n>1 ? (i/(n-1)-0.5)*b.burstArc : 0));
          bullets.push({ img:bimg, color:b.burstColor, shape:b.burstShape,
            scale:(b.burstScale!=null?b.burstScale:(b.scale||1)*0.55), r:b.burstR||Math.max(4,(b.r||8)*0.55),
            x:b.x, y:b.y, vx:Math.cos(ang)*bsp, vy:Math.sin(ang)*bsp,
            rot:b.burstImg?ang:0, spin:b.burstSpin!=null?b.burstSpin:(b.burstImg?0:0.2),
            life:b.burstLife, shrink:b.burstShrink, fade:b.burstFade, fadeDelay:b.burstFadeDelay, t:0, phase0:0 }); }
        continue;
      }
      b.t++; if (b.life && b.t > b.life) b.dead = true;
    }
    for (const nb of spawned) { nb.t = nb.t||0; nb.phase0 = nb.phase0||0; bullets.push(nb); }
    bullets = bullets.filter(b => !b.dead && b.x>-240 && b.x<CW+240 && b.y>-240 && b.y<CH+240);
    f++;
    if (f > (p.dur||480) + 110) reset();   // loop
    // draw
    ctx.fillStyle = FX.bgHue!=null ? 'hsl('+Math.round(FX.bgHue)+',65%,10%)' : '#000';
    ctx.fillRect(0,0,CW,CH);
    ctx.save();
    if (FX.shake) ctx.translate((Math.random()-0.5)*FX.shake, (Math.random()-0.5)*FX.shake);
    if (FX.bgStars) {   // twinkling white specks in the void
      for (let i = 0; i < 36; i++) {
        const px = (i*137 + t*(0.2+(i%3)*0.15)) % CW, py = (i*89 + Math.floor(i/7)*53) % CH;
        ctx.globalAlpha = 0.35 + 0.5*Math.abs(Math.sin(t*0.05+i));
        ctx.fillStyle = '#fff'; ctx.fillRect(px, py, i%4===0?2:1, i%4===0?2:1);
      }
      ctx.globalAlpha = 1;
    }
    if (FX.boss) {   // giant boss sprite behind the box
      const info = A.manifest.bullets[FX.boss.key], im = info && A.img['assets/bullets/'+info.f];
      if (im && im.width) drawSpr(ctx, im, FX.boss.x, FX.boss.y, { scale: FX.boss.scale||1, flip: FX.boss.flip });
    }
    // CAROUSEL far side: draw behind-the-box horses first, then a black box fill masks the inside part
    const hasBack = bullets.some(b => b.carousel && b._back);
    if (hasBack) {
      for (const b of bullets) if (!b.dead && b.carousel && b._back) drawBullet(ctx, b, b.x, b.y, 1);
      ctx.fillStyle = '#000'; ctx.fillRect(box.x, box.y, box.w, box.h);
    }
    ctx.strokeStyle = '#3adb3a'; ctx.lineWidth = 2;
    if (FX.hideBox) { /* full-screen arena: no border */ }
    else if (FX.split && FX.split.offset > 0.5) {   // halves separate OUTWARD from the cut
      const off = FX.split.offset, cx2 = box.x+box.w/2, cy2 = box.y+box.h/2;
      if (FX.split.axis==='h') { ctx.strokeRect(box.x, box.y-off, box.w, box.h/2); ctx.strokeRect(box.x, cy2+off, box.w, box.h/2); }
      else { ctx.strokeRect(box.x-off, box.y, box.w/2, box.h); ctx.strokeRect(cx2+off, box.y, box.w/2, box.h); }
    } else if (FX.pinch > 0.02) {   // Power-of-NEO suck: right side pinches height-wise (diagonal top/bottom)
      const p = FX.pinch * box.h / 2;
      ctx.beginPath(); ctx.moveTo(box.x, box.y); ctx.lineTo(box.x+box.w, box.y+p);
      ctx.lineTo(box.x+box.w, box.y+box.h-p); ctx.lineTo(box.x, box.y+box.h); ctx.closePath(); ctx.stroke();
    } else ctx.strokeRect(box.x, box.y, box.w, box.h);
    if (FX.faceBox) { const fb=FX.faceBox; ctx.strokeRect(fb.x, fb.y, fb.w, fb.h); }
    if (FX.arms) { ctx.strokeStyle='#49d049'; ctx.lineWidth=3; ctx.lineCap='round'; for (const arm of FX.arms){ ctx.beginPath(); ctx.moveTo(arm.x1,arm.y1); ctx.lineTo(arm.x2,arm.y2); ctx.stroke(); } }
    for (const b of bullets) if (!b.dead && b.shape !== 'line' && !(b.carousel && b._back)) drawBullet(ctx, b, b.x, b.y, 1);
    // red tell-lines are masked to the inside of the battle box
    ctx.save(); ctx.beginPath(); ctx.rect(box.x, box.y, box.w, box.h); ctx.clip();
    for (const b of bullets) if (!b.dead && b.shape === 'line') drawBullet(ctx, b, b.x, b.y, 1);
    ctx.restore();
    // yellow souls FACE RIGHT (they shoot toward Spamton)
    ctx.drawImage(soulImg, soul.x - soulImg.width/2, soul.y - soulImg.height/2);   // real heart sprite, drawn as-is
    ctx.restore();   // shake wrapper
  }
  return { step, reset };
}

// --- feedback state (localStorage) ---
const KEY = 'dv_attack_feedback';
let fb = {};
try { fb = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { fb = {}; }
function save() { localStorage.setItem(KEY, JSON.stringify(fb)); updateCount(); }
function updateCount() {
  const done = ATTACKS.filter(a => fb[a.id] && fb[a.id].verdict).length;
  document.getElementById('count').textContent = done + ' / ' + ATTACKS.length + ' marked';
}

function build() {
  const grid = document.getElementById('grid');
  const players = [];
  for (const spec of ATTACKS) {
    const card = document.createElement('div'); card.className = 'card';
    const rec = fb[spec.id] || (fb[spec.id] = { verdict:'', notes:'' });
    if (rec.verdict === 'good') card.classList.add('good');
    if (rec.verdict === 'bad')  card.classList.add('bad');
    card.innerHTML = `
      <div class="head">
        <div><div class="boss">${spec.boss}</div><div class="name">${spec.name}</div></div>
        <span class="soul ${spec.soul}">${spec.soul === 'yellow' ? '◆ yellow soul' : '♥ red soul'}</span>
      </div>
      <canvas width="${CW}" height="${CH}"></canvas>
      <div class="ctl">
        <div class="verdict">
          <button class="vb tick ${rec.verdict==='good'?'on':''}" title="Accurate">✓</button>
          <button class="vb cross ${rec.verdict==='bad'?'on':''}" title="Wrong">✗</button>
        </div>
        <button class="replay">↻ replay</button>
      </div>
      <textarea placeholder="What's right / wrong about this attack…">${rec.notes||''}</textarea>`;
    grid.appendChild(card);
    const canvas = card.querySelector('canvas');
    const tick = card.querySelector('.tick'), cross = card.querySelector('.cross');
    const notes = card.querySelector('textarea');
    const player = makePlayer(canvas, spec); players.push(player);
    tick.onclick = () => { rec.verdict = rec.verdict==='good'?'':'good'; card.classList.toggle('good', rec.verdict==='good'); card.classList.remove('bad');
      tick.classList.toggle('on', rec.verdict==='good'); cross.classList.remove('on'); save(); };
    cross.onclick = () => { rec.verdict = rec.verdict==='bad'?'':'bad'; card.classList.toggle('bad', rec.verdict==='bad'); card.classList.remove('good');
      cross.classList.toggle('on', rec.verdict==='bad'); tick.classList.remove('on'); save(); };
    card.querySelector('.replay').onclick = () => player.reset();
    notes.oninput = () => { rec.notes = notes.value; save(); };
  }
  updateCount();
  // FIXED-TIMESTEP loop: step() (update+draw) runs at a locked 60Hz regardless of the display's
  // refresh rate - otherwise the previews run 2-4x too fast on 120/144/240Hz screens (e.g. Linux).
  let last = 0, acc = 0;
  function loop(ts) {
    if (!last) last = ts;
    acc += Math.min(100, ts - last); last = ts;
    let steps = 0;
    while (acc >= 1000 / 60 && steps < 4) { acc -= 1000 / 60; for (const pl of players) pl.step(); steps++; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function summary() {
  const lines = ['DELTAVERSUS attack feedback', ''];
  for (const a of ATTACKS) {
    const r = fb[a.id] || {};
    const mark = r.verdict === 'good' ? '[✓ OK]' : r.verdict === 'bad' ? '[✗ WRONG]' : '[ ? unmarked ]';
    lines.push(`${mark} ${a.boss} — ${a.name} (${a.id})`);
    if (r.notes && r.notes.trim()) lines.push('    ' + r.notes.trim().replace(/\n/g, '\n    '));
  }
  return lines.join('\n');
}
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1600); }
document.getElementById('copyBtn').onclick = async () => {
  const s = summary(); document.getElementById('out').value = s;
  try { await navigator.clipboard.writeText(s); toast('Feedback copied — paste it back to me!'); }
  catch(e) { document.getElementById('out').select(); toast('Selected below — press Ctrl+C'); }
};
document.getElementById('dlBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(fb, null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'attack_feedback.json'; a.click();
};
document.getElementById('clearBtn').onclick = () => { if (confirm('Clear all marks and notes?')) { fb = {}; save(); location.reload(); } };

// patterns.js emit fns call Snd (jevil knife smash, big-shot explosion) - stub it so nothing throws
window.Snd = window.Snd || { play(){}, stop(){}, hold(){ return null; }, unlock(){}, playMusic(){} };

// loader: try to fetch the FULL manifest (so every bullet + Lancer's char-frame spades resolve);
// fall back to the embedded boss bullets if fetch is blocked (opened as a bare file://).
function loadSprites(need) {
  need.push('assets/ui/soul.png', 'assets/ui/soul/yheart0.png', 'assets/ui/soul/red0.png');
  let n = need.length;
  if (!n) { A.ready = true; build(); return; }
  for (const p of need) {
    const im = new Image();
    im.onload = im.onerror = () => { if (--n === 0) { A.ready = true; build(); } };
    im.src = p;
    A.img[p] = im;
  }
}
fetch('assets/manifest.json').then(r => r.json()).then(man => {
  A.manifest = man;
  const need = [];
  for (const b in man.bullets) need.push('assets/bullets/' + man.bullets[b].f);
  // Lancer's spade patterns draw char-frame sprites (imgs), so pull those too
  const lc = man.chars && man.chars.lancer;
  if (lc) for (const g of ['spade_white', 'spade_pink']) for (const f of (lc[g] || [])) need.push('assets/chars/lancer/' + f);
  loadSprites(need);
}).catch(() => {   // file:// fallback: embedded boss bullets only
  A.manifest = { bullets: EMBEDDED_BULLETS, chars:{}, anims:{}, fonts:{} };
  const need = [];
  for (const b in EMBEDDED_BULLETS) need.push('assets/bullets/' + EMBEDDED_BULLETS[b].f);
  loadSprites(need);
});
